<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MatinexHR Admin</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --blue:#2D84FE; --blue-soft:#E8F1FE; --gold:#EFAF0A; --gold-soft:#FDF4D9;
  --white:#FFFFFF; --canvas:#F8FBFF; --border:#E6E8EB; --grey:#6B7280; --dark:#111827;
  --green:#10B981; --red:#EF4444;
  --shadow-card: 0 24px 60px rgba(17,24,39,0.08);
  --shadow-btn: 0 12px 28px rgba(45,132,254,0.2);
  --font-body:'Inter',system-ui,sans-serif; --font-head:'Plus Jakarta Sans','Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--white);background:radial-gradient(circle at 20% 20%, rgba(124,90,237,0.25), transparent 0%), radial-gradient(circle at 80% 15%, rgba(45,132,254,0.16), transparent 0%), linear-gradient(180deg,#090d2a 0%,#111b45 100%);font-size:15px;-webkit-font-smoothing:antialiased;}
button{font:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,select,button{font:inherit}
h1,h2,h3,h4{font-family:var(--font-head);letter-spacing:-0.02em;line-height:1.2}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:rgba(255,255,255,0.98);border:1px solid rgba(255,255,255,0.14);border-radius:30px;padding:42px;width:100%;max-width:440px;box-shadow:0 40px 90px rgba(15,23,56,0.35);backdrop-filter:blur(22px);color:var(--dark);}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:26px;}
.login-logo img{height:44px;width:auto;flex-shrink:0;}
.login-card h1{font-size:28px;margin-bottom:8px;}
.login-card .sub{color:var(--grey);font-size:15px;line-height:1.6;}
.input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:15px;transition:all 180ms ease;}
.input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(45,132,254,0.12);}
.input-label{display:block;font-size:13.5px;font-weight:600;margin-bottom:8px;color:var(--dark);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:14px;font-weight:700;font-size:14.5px;transition:all 200ms ease;min-height:48px;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,#7c5aed,#4754f3);color:#fff;box-shadow:0 16px 36px rgba(124,90,237,0.32);}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);}
.btn-secondary{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
.btn-secondary:hover{background:var(--blue-soft);}
.btn-ghost{color:var(--dark);}
.btn-ghost:hover{background:rgba(249,250,255,0.9);}
.btn-block{width:100%;}
.btn-sm{padding:10px 18px;min-height:42px;font-size:14px;}

.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh;gap:24px;color:var(--dark);}
.sidebar{background:rgba(255,255,255,0.95);border:1px solid rgba(226,232,240,0.9);border-radius:24px;padding:24px;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 80px rgba(17,24,39,0.05);}
.sb-brand{display:flex;align-items:center;gap:12px;padding:16px 14px;border-radius:16px;background:linear-gradient(180deg,#ffffff,#f4f8ff);}
.sb-brand img{height:42px;width:auto;}
.sb-brand .name{font-family:var(--font-head);font-weight:800;font-size:16px;}
.sb-brand .sub{color:var(--grey);font-size:13px;}
.sb-link{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;font-weight:600;font-size:15px;color:var(--dark);background:transparent;transition:all 180ms ease;cursor:pointer;}
.sb-link:hover{background:var(--blue-soft);color:var(--blue);}
.sb-link.active{background:linear-gradient(180deg, rgba(45,132,254,0.12), rgba(45,132,254,0.06));color:var(--blue);}
.sb-spacer{flex:1;}

.main{display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:72px;background:rgba(255,255,255,0.96);border-bottom:1px solid rgba(226,232,240,0.9);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:20;backdrop-filter:blur(20px);}
.topbar .label{font-family:var(--font-head);font-weight:800;font-size:18px;}
.topbar .actions{display:flex;gap:12px;align-items:center;}
.content{padding:32px;flex:1;}

.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.page-head h1{font-size:30px;margin-bottom:4px;}
.page-head .sub{color:var(--grey);font-size:15px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid rgba(226,232,240,0.9);border-radius:18px;padding:24px;box-shadow:0 20px 50px rgba(17,24,39,0.05);}
.stat-card .lbl{font-size:13px;color:var(--grey);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:10px;}
.stat-card .val{font-family:var(--font-head);font-size:32px;font-weight:800;}
.stat-card.blue .val{color:var(--blue);}
.stat-card.gold .val{color:var(--gold);}
.toolbar{background:#fff;border:1px solid rgba(226,232,240,0.9);border-radius:18px;padding:18px;margin-bottom:20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;box-shadow:0 20px 50px rgba(17,24,39,0.04);}
.toolbar .search{flex:1;min-width:220px;position:relative;}
.toolbar .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey);width:18px;height:18px;}
.toolbar .search input{padding-left:44px;}

.table-card{background:#fff;border:1px solid rgba(226,232,240,0.9);border-radius:18px;overflow:hidden;box-shadow:0 20px 50px rgba(17,24,39,0.05);}
.table{width:100%;border-collapse:collapse;font-size:14px;}
.table th{background:rgba(247,248,255,0.9);text-align:left;padding:14px 18px;font-weight:700;font-size:13px;color:var(--grey);text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid rgba(226,232,240,0.9);}
.table td{padding:16px 18px;border-bottom:1px solid rgba(226,232,240,0.9);vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:rgba(239,246,255,0.8);}
.table tr.clickable{cursor:pointer;}
.badge{display:inline-block;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;}
.badge.blue{background:rgba(45,132,254,0.12);color:var(--blue);}
.badge.green{background:#D1FAE5;color:#065F46;}
.badge.gold{background:rgba(239,175,10,0.12);color:#92400E;}
.badge.grey{background:#F3F4F6;color:var(--grey);}
.count-badge{background:rgba(45,132,254,0.12);color:var(--blue);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;margin-left:8px;}

@media (max-width:900px) {
  .app{grid-template-columns:1fr;}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;flex-direction:row;border-right:none;border-top:1px solid rgba(226,232,240,0.9);padding:12px;justify-content:space-around;z-index:50;}
  .sb-brand{display:none;}
  .sb-link{flex-direction:column;gap:4px;font-size:12px;padding:8px 10px;}
  .sb-spacer{display:none;}
  .content{padding:24px;padding-bottom:120px;}
}
.empty{padding:64px 20px;text-align:center;color:var(--grey);}
.empty svg{width:64px;height:64px;margin-bottom:18px;opacity:0.5;}
.empty h3{color:var(--dark);margin-bottom:8px;}
.skeleton{height:48px;background:linear-gradient(90deg,#F3F4F6 25%,#E5E7EB 50%,#F3F4F6 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:10px;margin-bottom:10px;}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,0.55);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 200ms;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform 250ms;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-head{padding:24px 28px 0;display:flex;justify-content:space-between;gap:12px;}
.modal-head h3{font-size:20px;}
.modal-close{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--grey);}
.modal-close:hover{background:var(--canvas);}
.modal-body{padding:20px 28px 28px;}
.toast-host{position:fixed;bottom:24px;right:24px;z-index:400;display:flex;flex-direction:column;gap:10px;}
.toast{background:var(--dark);color:#fff;padding:14px 18px;border-radius:14px;font-size:14px;box-shadow:0 16px 40px rgba(17,24,39,0.2);animation:slideUp 250ms;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.hidden{display:none!important;}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Matinex logo">
      <div>
        <h1>Owner Access</h1>
        <p class="sub">MatinexHR Super Admin</p>
      </div>
    </div>
    <label class="input-label" for="pw">Secret Key</label>
    <input id="pw" class="input" type="password" placeholder="Enter your secret key" autocomplete="current-password">
    <button class="btn btn-primary btn-block" id="loginBtn" style="margin-top:18px">Access Dashboard</button>
  </div>
</div>

<div id="app" class="app hidden">
  <aside class="sidebar">
    <div class="sb-brand">
      <img src="logo.png" alt="Matinex logo">
      <div>
        <div class="name">MatinexHR</div>
        <div class="sub">Administrator</div>
      </div>
    </div>
    <button class="sb-link active" data-page="users">
      <span>Users</span>
    </button>
    <button class="sb-link" data-page="receipts">
      <span>Receipts</span>
    </button>
    <div class="sb-spacer"></div>
    <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="label">MatinexHR Admin</div>
      <div class="actions">
        <button class="btn btn-primary btn-sm" id="refreshBtn">Refresh</button>
      </div>
    </div>
    <section class="content">
      <div id="page-users">
        <div class="page-head">
          <div>
            <h1>Active Users <span class="count-badge" id="usersCount">0</span></h1>
            <p class="sub">Live user sign-ins, top anchors, and authentication status.</p>
          </div>
          <button class="btn btn-secondary btn-sm" id="exportUsers">Export CSV</button>
        </div>
        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" id="userSearch" placeholder="Search by name or email..." />
          </div>
        </div>
        <div class="table-card" id="usersTableCard"></div>
      </div>

      <div id="page-receipts" class="hidden">
        <div class="page-head">
          <div>
            <h1>Payment Receipts <span class="count-badge" id="receiptsCount">0</span></h1>
            <p class="sub">All recorded transactions and proof of payments.</p>
          </div>
          <button class="btn btn-secondary btn-sm" id="exportReceipts">Export CSV</button>
        </div>
        <div class="stat-grid">
          <div class="stat-card blue"><div class="lbl">Total Transactions</div><div class="val" id="statTxns">0</div></div>
          <div class="stat-card gold"><div class="lbl">Total Revenue</div><div class="val" id="statRev">₹0</div></div>
          <div class="stat-card"><div class="lbl">Avg. Order Value</div><div class="val" id="statAov">₹0</div></div>
        </div>
        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" id="receiptSearch" placeholder="Search receipt ID, name, or email..." />
          </div>
          <input class="input" type="date" id="dateFrom" style="max-width:160px" />
          <input class="input" type="date" id="dateTo" style="max-width:160px" />
        </div>
        <div class="table-card" id="receiptsTableCard"></div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="receiptModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-head">
      <h3>Receipt Details</h3>
      <button class="modal-close" data-close="receiptModal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="receiptBody"></div>
      <button class="btn btn-primary btn-block" id="downloadReceiptBtn" style="margin-top:16px">Download as PDF</button>
    </div>
  </div>
</div>

<div class="toast-host" id="toastHost" aria-live="polite"></div>
<script>
/* === CONFIG === */
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyJDETD_5LNKb-HDjyUYBPPiULoKMI9WeTlRiEQw2ikErvtSbA68kY6Q3oH3g47vixIkg/exec",
  ADMIN_TOKEN: "KK4TaFMkKNsiLxzIiy6L",
  ADMIN_PASSWORD: "matarusematinex"
};

/* === Toast === */
function toast(msg, type=''){
  const host = document.getElementById('toastHost');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  host.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),250); }, 3500);
}

/* === Login === */
const SK = 'matinex.admin.session';
function isLoggedIn(){ return sessionStorage.getItem(SK) === '1'; }
function login(){
  const pw = document.getElementById('pw').value;
  if (pw === CONFIG.ADMIN_PASSWORD) {
    sessionStorage.setItem(SK,'1');
    showApp();
  } else {
    toast('Incorrect password','error');
  }
}
function logout(){ sessionStorage.removeItem(SK); location.reload(); }
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key==='Enter') login(); });
document.getElementById('logoutBtn').addEventListener('click', logout);

function showApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadAll();
}

/* === Page nav === */
document.querySelectorAll('.sb-link[data-page]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sb-link').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const p = b.dataset.page;
    document.getElementById('page-users').classList.toggle('hidden', p!=='users');
    document.getElementById('page-receipts').classList.toggle('hidden', p!=='receipts');
  });
});

/* === Data === */
let USERS = [];
let RECEIPTS = [];

async function fetchSheet(sheet){
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.includes('XXXXXXXX')) {
    return demoData(sheet);
  }
  const url = `${CONFIG.APPS_SCRIPT_URL}?sheet=${sheet}&token=${encodeURIComponent(CONFIG.ADMIN_TOKEN)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Fetch failed');
  return r.json();
}

function demoData(sheet){
  if (sheet === 'users') return [
    { Timestamp:'2025-01-12T09:30:00Z', Name:'Asha Kumar', Email:'asha@example.com', AuthMethod:'Google', TopAnchor:'Service / Dedication to a Cause', AllScoresJSON:'{}' },
    { Timestamp:'2025-01-13T11:12:00Z', Name:'Rahul Mehta', Email:'rahul@example.com', AuthMethod:'Email', TopAnchor:'Entrepreneurial Creativity', AllScoresJSON:'{}' },
    { Timestamp:'2025-01-14T16:42:00Z', Name:'Priya Singh', Email:'priya@example.com', AuthMethod:'Google', TopAnchor:'Lifestyle', AllScoresJSON:'{}' }
  ];
  return [
    { Timestamp:'2025-01-13T11:30:00Z', ReceiptID:'MTX-20250113-AB12CD', Name:'Rahul Mehta', Email:'rahul@example.com', Amount:'20.00', Method:'UPI', Status:'Paid' },
    { Timestamp:'2025-01-14T16:55:00Z', ReceiptID:'MTX-20250114-EF34GH', Name:'Priya Singh', Email:'priya@example.com', Amount:'20.00', Method:'Card', Status:'Paid' }
  ];
}

async function loadAll(){
  loadUsers(); loadReceipts();
}
document.getElementById('refreshBtn').addEventListener('click', loadAll);

async function loadUsers(){
  const card = document.getElementById('usersTableCard');
  card.innerHTML = `<div style="padding:16px"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>`;
  try {
    USERS = await fetchSheet('users');
    renderUsers();
  } catch(e) {
    card.innerHTML = emptyState('Couldn\'t load users','Check your Apps Script URL and token, then retry.','retry-users');
    document.getElementById('retry-users')?.addEventListener('click', loadUsers);
  }
}

async function loadReceipts(){
  const card = document.getElementById('receiptsTableCard');
  card.innerHTML = `<div style="padding:16px"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>`;
  try {
    RECEIPTS = await fetchSheet('receipts');
    renderReceipts();
  } catch(e) {
    card.innerHTML = emptyState('Couldn\'t load receipts','Check your Apps Script URL and token, then retry.','retry-receipts');
    document.getElementById('retry-receipts')?.addEventListener('click', loadReceipts);
  }
}

function emptyState(title, sub, retryId){
  return `<div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <h3>${title}</h3><p>${sub}</p>
    ${retryId ? `<button class="btn btn-secondary btn-sm" id="${retryId}" style="margin-top:14px">Retry</button>` : ''}
  </div>`;
}

/* === Users render === */
function renderUsers(){
  const search = document.getElementById('userSearch').value.toLowerCase().trim();
  const rows = USERS.filter(u =>
    !search || (u.Name||'').toLowerCase().includes(search) || (u.Email||'').toLowerCase().includes(search)
  );
  document.getElementById('usersCount').textContent = USERS.length;
  const card = document.getElementById('usersTableCard');
  if (!rows.length) {
    card.innerHTML = emptyState('No users yet','As people sign in to see their results, they’ll appear here.');
    return;
  }
  card.innerHTML = `<table class="table"><thead><tr>
    <th>#</th><th>Name</th><th>Email</th><th>Auth</th><th>Top Anchor</th><th>Date</th>
  </tr></thead><tbody>
    ${rows.map((u,i) => `<tr>
      <td data-lbl="#">${i+1}</td>
      <td data-lbl="Name"><strong>${esc(u.Name||'—')}</strong></td>
      <td data-lbl="Email">${esc(u.Email||'—')}</td>
      <td data-lbl="Auth"><span class="badge ${u.AuthMethod==='Google'?'blue':'gold'}">${esc(u.AuthMethod||'—')}</span></td>
      <td data-lbl="Top Anchor">${esc(u.TopAnchor||'—')}</td>
      <td data-lbl="Date">${fmtDate(u.Timestamp)}</td>
    </tr>`).join('')}
  </tbody></table>`;
}
document.getElementById('userSearch').addEventListener('input', renderUsers);
document.getElementById('exportUsers').addEventListener('click', () => exportCSV('users.csv', USERS));

/* === Receipts render === */
function renderReceipts(){
  const search = document.getElementById('receiptSearch').value.toLowerCase().trim();
  const fromD = document.getElementById('dateFrom').value;
  const toD = document.getElementById('dateTo').value;
  let rows = RECEIPTS.slice();
  if (search) rows = rows.filter(r =>
    (r.ReceiptID||'').toLowerCase().includes(search) ||
    (r.Name||'').toLowerCase().includes(search) ||
    (r.Email||'').toLowerCase().includes(search));
  if (fromD) rows = rows.filter(r => new Date(r.Timestamp) >= new Date(fromD));
  if (toD) rows = rows.filter(r => new Date(r.Timestamp) <= new Date(toD + 'T23:59:59'));

  document.getElementById('receiptsCount').textContent = RECEIPTS.length;
  const total = RECEIPTS.reduce((s,r) => s + parseFloat(r.Amount||0), 0);
  document.getElementById('statTxns').textContent = RECEIPTS.length;
  document.getElementById('statRev').textContent = '₹' + total.toFixed(2);
  document.getElementById('statAov').textContent = '₹' + (RECEIPTS.length ? (total/RECEIPTS.length).toFixed(2) : '0.00');

  const card = document.getElementById('receiptsTableCard');
  if (!rows.length) {
    card.innerHTML = emptyState('No receipts found','Receipts appear here as soon as users complete a payment.');
    return;
  }
  card.innerHTML = `<table class="table"><thead><tr>
    <th>#</th><th>Receipt ID</th><th>Name</th><th>Email</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th>
  </tr></thead><tbody>
    ${rows.map((r,i) => `<tr class="clickable" data-rid="${esc(r.ReceiptID)}">
      <td data-lbl="#">${i+1}</td>
      <td data-lbl="Receipt ID"><strong>${esc(r.ReceiptID||'—')}</strong></td>
      <td data-lbl="Name">${esc(r.Name||'—')}</td>
      <td data-lbl="Email">${esc(r.Email||'—')}</td>
      <td data-lbl="Amount"><strong>₹${esc(r.Amount||'0')}</strong></td>
      <td data-lbl="Method"><span class="badge grey">${esc(r.Method||'—')}</span></td>
      <td data-lbl="Date">${fmtDate(r.Timestamp)}</td>
      <td data-lbl="Status"><span class="badge green">${esc(r.Status||'Paid')}</span></td>
    </tr>`).join('')}
  </tbody></table>`;
  card.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => openReceipt(tr.dataset.rid));
  });
}
document.getElementById('receiptSearch').addEventListener('input', renderReceipts);
document.getElementById('dateFrom').addEventListener('change', renderReceipts);
document.getElementById('dateTo').addEventListener('change', renderReceipts);
document.getElementById('exportReceipts').addEventListener('click', () => exportCSV('receipts.csv', RECEIPTS));

/* === Receipt modal === */
let activeReceipt = null;
function openReceipt(rid){
  const r = RECEIPTS.find(x => x.ReceiptID === rid);
  if (!r) return;
  activeReceipt = r;
  document.getElementById('receiptBody').innerHTML = `
    <div class="receipt">
      <div class="receipt-head">
        <div class="label">Matinex Career Anchors • Receipt</div>
        <div class="id">${esc(r.ReceiptID)}</div>
        <div class="amt">₹${esc(r.Amount)}</div>
      </div>
      <div class="receipt-body">
        <div class="receipt-row"><span class="k">Customer</span><span class="v">${esc(r.Name)}</span></div>
        <div class="receipt-row"><span class="k">Email</span><span class="v">${esc(r.Email)}</span></div>
        <div class="receipt-row"><span class="k">Item</span><span class="v">Detailed Career Anchors Report</span></div>
        <div class="receipt-row"><span class="k">Method</span><span class="v">${esc(r.Method)}</span></div>
        <div class="receipt-row"><span class="k">Date</span><span class="v">${fmtDate(r.Timestamp)}</span></div>
        <div class="receipt-row"><span class="k">Status</span><span class="v"><span class="badge green">${esc(r.Status||'Paid')}</span></span></div>
      </div>
    </div>`;
  document.getElementById('receiptModal').classList.add('open');
}
document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', () => document.getElementById(b.dataset.close).classList.remove('open')));
document.getElementById('receiptModal').addEventListener('click', e => { if (e.target.id==='receiptModal') e.currentTarget.classList.remove('open'); });

document.getElementById('downloadReceiptBtn').addEventListener('click', () => {
  if (!activeReceipt) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const W = doc.internal.pageSize.getWidth(); const M = 56;
  doc.setFillColor(45,132,254); doc.rect(0,0,W,120,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('MATINEX CAREER ANCHORS • RECEIPT', M, 50);
  doc.setFontSize(20); doc.text(activeReceipt.ReceiptID, M, 80);
  doc.setFontSize(28); doc.text(`₹${activeReceipt.Amount}`, M, 110);

  doc.setTextColor(17,24,39); doc.setFont('helvetica','normal'); doc.setFontSize(11);
  let y = 170;
  const rows = [
    ['Customer', activeReceipt.Name],
    ['Email', activeReceipt.Email],
    ['Item','Detailed Career Anchors Report'],
    ['Payment method', activeReceipt.Method],
    ['Date', fmtDate(activeReceipt.Timestamp)],
    ['Status', activeReceipt.Status||'Paid']
  ];
  rows.forEach(([k,v]) => {
    doc.setTextColor(107,114,128); doc.text(k, M, y);
    doc.setTextColor(17,24,39); doc.text(String(v), W-M, y, { align:'right' });
    doc.setDrawColor(230,232,235); doc.line(M, y+8, W-M, y+8);
    y += 28;
  });
  doc.setFontSize(9); doc.setTextColor(107,114,128);
  doc.text('Thank you for your purchase. — Matinex', M, y + 24);
  doc.save(`Receipt-${activeReceipt.ReceiptID}.pdf`);
});

/* === Helpers === */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){ if(!ts) return '—'; try { const d=new Date(ts); return d.toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ts; } }
function exportCSV(fn, rows){
  if (!rows.length) { toast('Nothing to export','error'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(',')].concat(rows.map(r => headers.map(h => `"${String(r[h]||'').replace(/"/g,'""')}"`).join(','))).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fn; a.click();
  toast('Exported','success');
}

/* === Init === */
if (isLoggedIn()) showApp();
</script>
</body>
</html>
